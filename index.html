function isValidEmail(email) {
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

// ── Error Boundary ────────────────────────────────────────────────────────────
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { hasError: false }; }
  static getDerivedStateFromError() { return { hasError: true }; }
  componentDidCatch(error, info) { console.error("App error:", error, info); }
  render() {
    if (this.state.hasError) return (
      React.createElement('div', { style: { minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", background:"#f1f0fb", padding:20 } },
        React.createElement('div', { style: { background:"#fff", borderRadius:16, padding:32, maxWidth:400, textAlign:"center", boxShadow:"0 4px 24px rgba(0,0,0,0.1)" } },
          React.createElement('div', { style: { fontSize:48, marginBottom:16 } }, "⚠️"),
          React.createElement('h2', { style: { color:"#2d2b4e", marginBottom:8 } }, "Something went wrong"),
          React.createElement('p', { style: { color:"#6b6899", fontSize:14, marginBottom:20 } }, "The portal encountered an error. Please refresh the page."),
          React.createElement('button', { onClick: () => window.location.reload(), style: { background:"#3C3489", color:"#fff", border:"none", borderRadius:8, padding:"10px 24px", fontSize:14, fontWeight:600, cursor:"pointer" } }, "Refresh Page")
        )
      )
    );
    return this.props.children;
  }
}

// ── DB Layer (localStorage) ──────────────────────────────────────────────────
function initDB() {
  try {
    const raw = localStorage.getItem("lukona_db_v4");
    if (!raw) { localStorage.setItem("lukona_db_v4", JSON.stringify(SEED)); return; }
    const db = JSON.parse(raw);
    if (!db || !db.users || !Array.isArray(db.users) || db.users.length < 3) {
      localStorage.setItem("lukona_db_v4", JSON.stringify(SEED));
    }
    // Make sure all seed users always exist
    const emailsInDB = db.users ? db.users.map(u => u.email) : [];
    let changed = false;
    SEED.users.forEach(seedUser => {
      if (!emailsInDB.includes(seedUser.email)) {
        db.users = db.users || [];
        db.users.push(seedUser);
        changed = true;
      }
    });
    if (changed) localStorage.setItem("lukona_db_v4", JSON.stringify(db));
  } catch(e) {
    localStorage.removeItem("lukona_db_v4");
    localStorage.setItem("lukona_db_v4", JSON.stringify(SEED));
  }
}
function getDB() {
  return JSON.parse(localStorage.getItem("lukona_db_v4") || "{}");
}
function saveDB(db) {
  localStorage.setItem("lukona_db_v4", JSON.stringify(db));
}
function nextId(arr) {
  return arr.length ? Math.max(...arr.map(x => x.id)) + 1 : 1;
}

// ── Auth ─────────────────────────────────────────────────────────────────────
function loginUser(email, password) {
  const db = getDB();
  const user = db.users.find(u => u.email === email && u.password === password);
  if (!user) return null;
  const token = btoa(JSON.stringify({ id: user.id, role: user.role, exp: Date.now() + 86400000 }));
  localStorage.setItem("lukona_token_v4", token);
  return user;
}
function getSession() {
  try {
    const token = localStorage.getItem("lukona_token_v4");
    if (!token) return null;
    const payload = JSON.parse(atob(token));
    if (payload.exp < Date.now()) { localStorage.removeItem("lukona_token_v4"); return null; }
    const db = getDB();
    return db.users.find(u => u.id === payload.id) || null;
  } catch { return null; }
}
function logout() {
  localStorage.removeItem("lukona_token_v4");
}

      {toasts.map(t => (

          background: t.type==="error" ? C.red : t.type==="warn" ? C.yellow : C.purple,
          color: C.white, padding:"12px 20px", borderRadius:10, fontSize:14, fontWeight:500,
          boxShadow:"0 4px 20px rgba(0,0,0,0.2)", minWidth:240, maxWidth:320,
          animation:"slideIn 0.3s ease",
        }}>
          {t.msg}
        </div>
      ))}
    </div>
  );
}

function useToast() {
  const [toasts, setToasts] = useState([]);
  const show = useCallback((msg, type="success") => {
    const id = Date.now();
    setToasts(p => [...p, { id, msg, type }]);
    setTimeout(() => setToasts(p => p.filter(t => t.id !== id)), 3500);
  }, []);
  return { toasts, show };
}

function Btn({ children, variant="primary", size="md", ...props }) {
  const base = {
    border:"none", borderRadius:8, cursor:"pointer", fontWeight:600,
    fontSize: size==="sm" ? 13 : 14,
    padding: size==="sm" ? "6px 14px" : "10px 22px",
    transition:"opacity 0.15s",
  };
  const variants = {
    primary:  { background:C.purple,  color:C.white },
    danger:   { background:C.red,     color:C.white },
    ghost:    { background:C.purpleFade, color:C.purple },
    outline:  { background:"none", color:C.purple, border:`1.5px solid ${C.purple}` },
  };
  return (
    <button {...props} style={{ ...base, ...variants[variant], ...props.style }}
      onMouseEnter={e => e.currentTarget.style.opacity="0.85"}
      onMouseLeave={e => e.currentTarget.style.opacity="1"}>
      {children}
    </button>
  );
}

// ── Login Page ────────────────────────────────────────────────────────────────
function LoginPage({ onLogin }) {
  const [screen, setScreen] = useState("login"); // login | forgot | reset | success
  const [email, setEmail] = useState("");
  const [pass, setPass] = useState("");
  const [err, setErr] = useState("");
  const [loading, setLoading] = useState(false);
  // Forgot password states
  const [forgotEmail, setForgotEmail] = useState("");
  const [forgotErr, setForgotErr] = useState("");
  const [forgotLoading, setForgotLoading] = useState(false);
  const [secAnswer, setSecAnswer] = useState("");
  const [newPass, setNewPass] = useState("");
  const [confirmPass, setConfirmPass] = useState("");
  const [resetErr, setResetErr] = useState("");
  const [foundUser, setFoundUser] = useState(null);

  function handle(e) {
    e.preventDefault();
    if (!email || !pass) { setErr("Please enter both email and password."); return; }
    if (!isValidEmail(email)) { setErr("Please enter a valid email address."); return; }
    setLoading(true);
    setTimeout(() => {
      const user = loginUser(email, pass);
      setLoading(false);
      if (user) onLogin(user);
      else setErr("Invalid email or password.");
    }, 600);
  }

  function handleForgot(e) {
    e.preventDefault();
    if (!forgotEmail) { setForgotErr("Please enter your email address."); return; }
    if (!isValidEmail(forgotEmail)) { setForgotErr("Please enter a valid email address."); return; }
    setForgotLoading(true);
    setTimeout(() => {
      const db = getDB();
      const user = db.users.find(u => u.email === forgotEmail);
      setForgotLoading(false);
      if (!user) { setForgotErr("No account found with that email address."); return; }
      setFoundUser(user);
      setScreen("reset");
    }, 800);
  }

  function handleReset(e) {
    e.preventDefault();
    if (!newPass || !confirmPass) { setResetErr("Please fill in both password fields."); return; }

// ── Dashboard ─────────────────────────────────────────────
function DashboardPage({ user }) {
  const [loading, setLoading] = useState(true);
  const [data, setData] = useState({});
  useEffect(() => {
    setTimeout(() => {
      const db = getDB();
      const student = db.students.find(s => s.user_id === user.id);
      let avgMark = 0, attendancePct = 0, assignmentsDue = 0, unreadMsg = 0;
      if (student) {
        const myResults = db.results.filter(r => r.student_id === student.id);
        avgMark = myResults.length ? Math.round(myResults.reduce((s,r)=>s+r.mark,0)/myResults.length) : 0;
        const myAtt = db.attendance.filter(a => a.student_id === student.id);
        attendancePct = myAtt.length ? Math.round(myAtt.filter(a=>a.status==="Present").length/myAtt.length*100) : 100;
        assignmentsDue = db.assignments.filter(a => {
          const st = a.statuses?.[student.id];
          return st !== "Submitted";
        }).length;
      }
      unreadMsg = db.messages.filter(m => m.receiver_id === user.id && !m.read).length;
      const today = new Date().toLocaleDateString("en-US",{weekday:"long"});
      const todayTT = db.timetable.filter(t => t.day === today).map(t => ({
        ...t, subjectName: db.subjects.find(s=>s.id===t.subject_id)?.name || "Unknown"
      }));
      const recentNotices = db.notices.slice(0,3);
      const myAssignments = db.assignments.slice(0,3).map(a => ({
        ...a, subjectName: db.subjects.find(s=>s.id===a.subject_id)?.name,
        myStatus: student ? (a.statuses?.[student.id] || "Not Started") : "N/A",
      }));
      setData({ avgMark, attendancePct, assignmentsDue, unreadMsg, todayTT, recentNotices, myAssignments });
      setLoading(false);
    }, 500);
  }, [user]);

  if (loading) return <Spinner />;
  const role = user.role;

  return (
    <div>
      <div style={{ marginBottom:24 }}>
        <h2 style={{ margin:0, fontSize:24, fontWeight:800, color:C.gray800 }}>
          Good {new Date().getHours()<12?"Morning":new Date().getHours()<18?"Afternoon":"Evening"}, {user.name.split(" ")[0]} 👋
        </h2>
        <p style={{ margin:"6px 0 0", color:C.gray600, fontSize:14 }}>
          {new Date().toLocaleDateString("en-US",{weekday:"long",year:"numeric",month:"long",day:"numeric"})}
        </p>
      </div>

      {role === "student" && (
        <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))", gap:16, marginBottom:24 }}>
          <StatCard icon="📊" label="Average Mark" value={`${data.avgMark}%`} color={data.avgMark>=75?"green":data.avgMark>=50?"yellow":"red"} sub="Term 1 2026" />
          <StatCard icon="✅" label="Attendance" value={`${data.attendancePct}%`} color={data.attendancePct>=85?"green":data.attendancePct>=70?"yellow":"red"} sub="This term" />
          <StatCard icon="📝" label="Assignments Due" value={data.assignmentsDue} color={data.assignmentsDue===0?"green":data.assignmentsDue<=2?"yellow":"red"} sub="Pending" />
          <StatCard icon="💬" label="Unread Messages" value={data.unreadMsg} color={data.unreadMsg===0?"green":"yellow"} sub="In your inbox" />
        </div>
      )}
      {role === "teacher" && (
        <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))", gap:16, marginBottom:24 }}>
          <StatCard icon="👩‍🎓" label="Total Students" value={getDB().students.length} color="purple" />
          <StatCard icon="📚" label="Subjects" value={getDB().subjects.length} color="blue" />
          <StatCard icon="📝" label="Assignments" value={getDB().assignments.length} color="yellow" />
          <StatCard icon="💬" label="Unread Messages" value={data.unreadMsg} color={data.unreadMsg===0?"green":"yellow"} />
        </div>
      )}
      {role === "admin" && (
        <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))", gap:16, marginBottom:24 }}>
          <StatCard icon="👩‍🎓" label="Students" value={getDB().students.length} color="purple" />
          <StatCard icon="👨‍🏫" label="Teachers" value={getDB().teachers.length} color="blue" />
          <StatCard icon="📚" label="Subjects" value={getDB().subjects.length} color="green" />
          <StatCard icon="📢" label="Notices" value={getDB().notices.length} color="yellow" />
        </div>
      )}

      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(300px,1fr))", gap:16 }}>
        {/* Today's Timetable */}
        <Card>
          <h3 style={{ margin:"0 0 14px", fontSize:15, fontWeight:700, color:C.gray800 }}>📅 Today's Timetable</h3>
          {data.todayTT?.length ? data.todayTT.map(t => (

              <div style={{ background:C.purpleFade, padding:"4px 10px", borderRadius:8, fontSize:12, fontWeight:700, color:C.purple, whiteSpace:"nowrap" }}>

        <Card>
          <h3 style={{ margin:"0 0 14px", fontSize:15, fontWeight:700, color:C.gray800 }}>📢 Recent Notices</h3>
          {data.recentNotices?.map(n => (
            <div key={n.id} style={{ padding:"10px 0", borderBottom:`1px solid ${C.gray100}` }}>
              <div style={{ fontWeight:600, fontSize:14, color:C.gray800 }}>{n.title}</div>
              <div style={{ fontSize:12, color:C.gray600, marginTop:3 }}>{n.body.substring(0,80)}…</div>
              <div style={{ fontSize:11, color:C.gray400, marginTop:3 }}>{n.date_posted}</div>

          ))}
        </Card>

        {/* Upcoming Assignments */}
        {role === "student" && (
          <Card>
            <h3 style={{ margin:"0 0 14px", fontSize:15, fontWeight:700, color:C.gray800 }}>📝 Upcoming Assignments</h3>
            {data.myAssignments?.map(a => (
              <div key={a.id} style={{ padding:"10px 0", borderBottom:`1px solid ${C.gray100}` }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                  <div style={{ fontWeight:600, fontSize:14, color:C.gray800 }}>{a.title}</div>
                  <Badge label={a.myStatus} color={a.myStatus==="Submitted"?"green":a.myStatus==="In Progress"?"yellow":"red"} />
                </div>
                <div style={{ fontSize:12, color:C.gray400, marginTop:3 }}>Due: {a.due_date} · {a.subjectName}</div>
              </div>
            ))}
          </Card>
        )}
      </div>
    </div>
  );
}


// ── Teachers Page ──────────────────────────────────────────
function TeachersPage({ user, toast }) {
  const [loading, setLoading] = useState(true);
  const [teachers, setTeachers] = useState([]);
  const [modal, setModal] = useState(null);
  const [editing, setEditing] = useState(null);
  const [form, setForm] = useState({ name:"", email:"", password:"teacher123", subject:"", subjects:[] });

  function load() {
    const db = getDB();
    const list = db.teachers.map(t => {
      const u = db.users.find(u => u.id === t.user_id);
      const teacherSubjects = db.subjects.filter(s => s.teacher_id === t.id);
      return { ...t, userName: u?.name, userEmail: u?.email, subjectNames: teacherSubjects.map(s=>s.name).join(", ") || t.subject };
    });
    setTeachers(list);
    setLoading(false);
  }
  useEffect(() => { setTimeout(load, 300); }, []);

  function openAdd() {
    setForm({ name:"", email:"", password:"teacher123", subject:"", subjects:[] });
    setEditing(null); setModal("add");
  }
  function openEdit(t) {
    const db = getDB();
    const u = db.users.find(u=>u.id===t.user_id);
    setForm({ name:u?.name||"", email:u?.email||"", password:"", subject:t.subject, subjects:[] });
    setEditing(t); setModal("edit");
  }
  function save() {
    if (!form.name||!form.email) { toast("Name and email are required.","error"); return; }
    if (!isValidEmail(form.email)) { toast("Please enter a valid email address.","error"); return; }
    if (!form.subject) { toast("Please enter a subject.","error"); return; }
    const db = getDB();
    if (modal==="add") {
      // Check email not already used
      if (db.users.find(u=>u.email===form.email)) { toast("Email already in use.","error"); return; }
      const uid = nextId(db.users);
      db.users.push({ id:uid, name:form.name, email:form.email, password:form.password||"teacher123", role:"teacher" });
      const tid = nextId(db.teachers);
      db.teachers.push({ id:tid, user_id:uid, subject:form.subject });
      // Assign teacher to a new subject if specified
      if (form.subject) {

function StudentsPage({ user, toast }) {
  const [loading, setLoading] = useState(true);

  const [gradeFilter, setGradeFilter] = useState("All");

  const [form, setForm] = useState({ name:"",email:"",password:"student123",grade:"Grade 10",gender:"Female",dob:"",parent_name:"",parent_phone:"" });

  function load() {
    const db = getDB();
    const list = db.students.map(s => {
      const u = db.users.find(u => u.id === s.user_id);
      return { ...s, userName: u?.name, userEmail: u?.email };
    });
    setStudents(list);
    setLoading(false);
  }
  useEffect(() => { setTimeout(load, 400); }, []);

  const grades = ["All", "Grade 8","Grade 9","Grade 10","Grade 11","Grade 12"];
  const filtered = students.filter(s =>
    (gradeFilter==="All" || s.grade===gradeFilter) &&
    (!search || s.userName?.toLowerCase().includes(search.toLowerCase()) || s.userEmail?.toLowerCase().includes(search.toLowerCase()))
  );

  function openAdd() {
    setForm({ name:"",email:"",password:"student123",grade:"Grade 10",gender:"Female",dob:"",parent_name:"",parent_phone:"" });
    setEditing(null); setModal("add");
  }
  function openEdit(s) {
    const db = getDB();
    const u = db.users.find(u=>u.id===s.user_id);
    setForm({ name:u.name, email:u.email, password:"", grade:s.grade, gender:s.gender, dob:s.dob, parent_name:s.parent_name, parent_phone:s.parent_phone });
    setEditing(s); setModal("edit");
  }
  function save() {
    if (!form.name||!form.email) { toast("Name and email are required.","error"); return; }
    const db = getDB();
    if (modal==="add") {
      const uid = nextId(db.users);
      db.users.push({ id:uid, name:form.name, email:form.email, password:form.password||"student123", role:"student" });
      db.students.push({ id:nextId(db.students), user_id:uid, grade:form.grade, gender:form.gender, dob:form.dob, parent_name:form.parent_name, parent_phone:form.parent_phone });
      toast("Student added successfully.");
    } else {
      const u = db.users.find(u=>u.id===editing.user_id);
      if (u) { u.name=form.name; u.email=form.email; if(form.password) u.password=form.password; }
      const s = db.students.find(s=>s.id===editing.id);
      if (s) { s.grade=form.grade; s.gender=form.gender; s.dob=form.dob; s.parent_name=form.parent_name; s.parent_phone=form.parent_phone; }
      toast("Student updated.");
    }
    saveDB(db); setModal(null); load();
  }
  function del(s) {
    if (!confirm(`Delete student ${s.userName}? This cannot be undone.`)) return;
    const db = getDB();
    db.students = db.students.filter(x=>x.id!==s.id);
    db.users = db.users.filter(x=>x.id!==s.user_id);
    saveDB(db); toast("Student deleted.","warn"); load();
  }

  if (loading) return <Spinner />;
  return (
    <div>
      <PageHeader title="Students" subtitle={`${students.length} enrolled students`}
        action={user.role==="admin" && <Btn onClick={openAdd}>+ Add Student</Btn>} />

        <div style={{ display:"flex", gap:12, flexWrap:"wrap" }}>
          <input placeholder="Search by name or email…" value={search} onChange={e=>setSearch(e.target.value)} style={{
            flex:1, minWidth:200, padding:"9px 14px", border:`1.5px solid ${C.gray200}`, borderRadius:8, fontSize:14,
          }} />
          <select value={gradeFilter} onChange={e=>setGradeFilter(e.target.value)} style={{
            padding:"9px 14px", border:`1.5px solid ${C.gray200}`, borderRadius:8, fontSize:14,
          }}>
            {grades.map(g=><option key={g}>{g}</option>)}
          </select>
        </div>
      </Card>
      <Card>
        <div style={{ overflowX:"auto" }}>
          <table style={{ width:"100%", borderCollapse:"collapse" }}>
            <thead>
              <tr style={{ borderBottom:`2px solid ${C.gray100}` }}>
                {["Name","Email","Grade","Gender","Parent","Actions"].map(h=>(
                  <th key={h} style={{ padding:"10px 14px", textAlign:"left", fontSize:12, fontWeight:700, color:C.gray600, whiteSpace:"nowrap" }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {filtered.map(s=>(
                <tr key={s.id} style={{ borderBottom:`1px solid ${C.gray100}` }}
                  onMouseEnter={e=>e.currentTarget.style.background=C.gray50}
                  onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                  <td style={{ padding:"12px 14px", fontWeight:600, color:C.gray800 }}>
                    <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                      <div style={{ width:32,height:32,borderRadius:8,background:C.purpleFade,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,color:C.purple }}>{s.userName?.[0]}</div>
                      {s.userName}

                  </td>
                  <td style={{ padding:"12px 14px", fontSize:13, color:C.gray600 }}>{s.userEmail}</td>

  );
}

function SubjectsPage({ user, toast }) {

  function load() {
    const db = getDB();
    setItems(db.subjects.map(s => ({
      ...s,
      teacherName: db.teachers.find(t=>t.id===s.teacher_id) ? db.users.find(u=>u.id===db.teachers.find(t=>t.id===s.teacher_id)?.user_id)?.name : "Unassigned"
    })));
    setLoading(false);
  }
  useEffect(()=>{ setTimeout(load,300); },[]);

  function openAdd() { setForm({ name:"", grade:"Grade 10", teacher_id:"" }); setEditing(null); setModal(true); }

      toast("Subject added.");

      const s = db.subjects.find(x=>x.id===editing.id);
      if(s){ s.name=form.name; s.grade=form.grade; s.teacher_id=Number(form.teacher_id)||null; }
      toast("Subject updated.");
    }
    saveDB(db); setModal(false); load();
  }
  function del(id) {
    if (!confirm("Delete this subject?")) return;
    const db = getDB(); db.subjects = db.subjects.filter(s=>s.id!==id); saveDB(db); toast("Deleted.","warn"); load();

                <div style={{ display:"flex", flexDirection:"column", gap:6 }}>

function TimetablePage({ user, toast }) {
  const [grade, setGrade] = useState("Grade 10");
  const [loading, setLoading] = useState(true);
  const [tt, setTt] = useState([]);
  const [modal, setModal] = useState(false);
  const [editingCell, setEditingCell] = useState(null);
  const [form, setForm] = useState({ day:"Monday", period:1, start_time:"07:30", end_time:"08:30", subject_id:"", room:"", grade:"Grade 10" });
  const DAYS = ["Monday","Tuesday","Wednesday","Thursday","Friday"];
  const PERIODS = [1,2,3,4,5];

  function load() {
    const db = getDB();
    setTt(db.timetable.map(t=>({
      ...t, subjectName: db.subjects.find(s=>s.id===t.subject_id)?.name||"?"
    })));
    setLoading(false);
  }
  useEffect(()=>{ setTimeout(load,300); },[]);

  const grades = ["Grade 8","Grade 9","Grade 10","Grade 11","Grade 12"];
  const filtered = tt.filter(t=>t.grade===grade);
  function getCell(day,period) {
    return filtered.find(t=>t.day===day && t.period===period);
  }

  function openAddCell(day, period) {
    setForm({ day, period, start_time:"07:30", end_time:"08:30", subject_id:"", room:"", grade });
    setEditingCell(null);
    setModal(true);
  }
  function openEditCell(cell) {
    setForm({ day:cell.day, period:cell.period, start_time:cell.start_time, end_time:cell.end_time, subject_id:String(cell.subject_id), room:cell.room, grade:cell.grade });
    setEditingCell(cell);
    setModal(true);
  }
  function saveCell() {
    if (!form.subject_id || !form.room) { toast("Subject and room are required.","error"); return; }
    const db = getDB();
    if (editingCell) {
      const t = db.timetable.find(x=>x.id===editingCell.id);
      if (t) { Object.assign(t, { ...form, subject_id:Number(form.subject_id), period:Number(form.period) }); }
      toast("Timetable slot updated.");
    } else {
      db.timetable.push({ id:nextId(db.timetable), ...form, subject_id:Number(form.subject_id), period:Number(form.period) });
      toast("Timetable slot added.");
    }
    saveDB(db); setModal(false); load();
  }
  function deleteCell(cell) {
    if (!confirm(`Remove ${cell.subjectName} from ${cell.day} Period ${cell.period}?`)) return;
    const db = getDB();
    db.timetable = db.timetable.filter(x=>x.id!==cell.id);
    saveDB(db); toast("Slot removed.","warn"); load();
  }

  const db2 = getDB();
  const subjects = db2.subjects.filter(s=>s.grade===grade || s.grade==="All Grades");

        <Card style={{ marginBottom:16, background:C.purpleFade }}>

                {DAYS.map(d=>(
                  <th key={d} style={{ padding:"10px 14px", fontSize:12, fontWeight:700, color:C.purple, textAlign:"center", background:C.purpleFade }}>{d}</th>

                          <span style={{ color:C.gray200, fontSize:12 }}>—</span>
                        )}
                      </td>
                    );
                  })}
                </tr>
              ))}

          <Select label="Grade" value={form.grade} onChange={e=>setForm(p=>({...p,grade:e.target.value}))}>
            {grades.map(g=><option key={g}>{g}</option>)}

          <div style={{ display:"flex", gap:10, justifyContent:"space-between", marginTop:8 }}>
            <div>
              {editingCell && (
                <Btn variant="danger" onClick={()=>{ deleteCell(editingCell); setModal(false); }}>Remove Slot</Btn>
              )}
            </div>
            <div style={{ display:"flex", gap:10 }}>

        </Modal>
      )}
    </div>
  );
}

// ── Attendance Page ────────────────────────────────────────
function AttendancePage({ user, toast }) {
  const [records, setRecords] = useState([]);
  const [students, setStudents] = useState([]);
  const [loading, setLoading] = useState(true);
  const [date, setDate] = useState(new Date().toISOString().slice(0,10));
  const [marking, setMarking] = useState(false);
  const [marks, setMarks] = useState({});

  function load() {
    const db = getDB();
    const myStudent = db.students.find(s=>s.user_id===user.id);
    let atts = user.role==="student"
      ? db.attendance.filter(a=>a.student_id===myStudent?.id)
      : db.attendance;
    const enriched = atts.map(a=>({
      ...a,
      studentName: db.users.find(u=>u.id===db.students.find(s=>s.id===a.student_id)?.user_id)?.name,
    }));
    setRecords(enriched);
    const sts = db.students.map(s=>({ ...s, name: db.users.find(u=>u.id===s.user_id)?.name }));
    setStudents(sts);
    // init marks
    const m = {};
    sts.forEach(s => {
      const existing = db.attendance.find(a=>a.student_id===s.id&&a.date===date);
      m[s.id] = existing?.status || "Present";
    });
    setMarks(m);
    setLoading(false);
  }
  useEffect(()=>{ setTimeout(load,400); },[date]);

  function saveAttendance() {
    const db = getDB();
    students.forEach(s=>{
      const existing = db.attendance.find(a=>a.student_id===s.id&&a.date===date);
      if (existing) existing.status = marks[s.id]||"Present";
      else db.attendance.push({ id:nextId(db.attendance), student_id:s.id, date, status:marks[s.id]||"Present", reason:"" });
    });
    saveDB(db); toast("Attendance saved."); setMarking(false); load();
  }

  const statusColor = s => s==="Present"?"green":s==="Late"?"yellow":"red";
  if (loading) return <Spinner />;

  const myStudent = getDB().students.find(s=>s.user_id===user.id);
  const myRecords = user.role==="student" ? records : records.filter(r=>r.date===date);
  const summary = user.role==="student" ? {
    total: records.length,
    present: records.filter(r=>r.status==="Present").length,
    late: records.filter(r=>r.status==="Late").length,
    absent: records.filter(r=>r.status==="Absent").length,
  } : null;

  return (
    <div>
      <PageHeader title="Attendance" subtitle="Daily attendance records"
        action={user.role!=="student" && (
          <div style={{ display:"flex", gap:8 }}>
            <input type="date" value={date} onChange={e=>setDate(e.target.value)} style={{
              padding:"9px 14px", border:`1.5px solid ${C.gray200}`, borderRadius:8, fontSize:14,
            }} />
            <Btn onClick={()=>setMarking(!marking)}>{marking?"Cancel":"Mark Attendance"}</Btn>
          </div>
        )} />

      {summary && (
        <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))", gap:12, marginBottom:20 }}>
          <StatCard icon="📅" label="Total Days" value={summary.total} color="purple" />
          <StatCard icon="✅" label="Present" value={summary.present} color="green" />
          <StatCard icon="⏰" label="Late" value={summary.late} color="yellow" />
          <StatCard icon="❌" label="Absent" value={summary.absent} color="red" />
        </div>
      )}

      {user.role!=="student" && marking && (
        <Card style={{ marginBottom:16 }}>
          <h3 style={{ margin:"0 0 14px", fontSize:15, fontWeight:700 }}>Mark Attendance for {date}</h3>
          {students.map(s=>(
            <div key={s.id} style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"10px 0", borderBottom:`1px solid ${C.gray100}` }}>
              <span style={{ fontWeight:500, color:C.gray800 }}>{s.name} · {s.grade}</span>
              <select value={marks[s.id]||"Present"} onChange={e=>setMarks(p=>({...p,[s.id]:e.target.value}))} style={{
                padding:"6px 12px", border:`1.5px solid ${C.gray200}`, borderRadius:8, fontSize:13,
              }}>
                <option>Present</option><option>Late</option><option>Absent</option>
              </select>
            </div>
          ))}
          <div style={{ marginTop:16 }}>
            <Btn onClick={saveAttendance}>Save Attendance</Btn>
          </div>
        </Card>
      )}

      <Card>
        <div style={{ overflowX:"auto" }}>
          <table style={{ width:"100%", borderCollapse:"collapse" }}>
            <thead>
              <tr style={{ borderBottom:`2px solid ${C.gray100}` }}>
                {(user.role!=="student"?["Student","Date","Status"]:["Date","Status"]).map(h=>(
                  <th key={h} style={{ padding:"10px 14px", textAlign:"left", fontSize:12, fontWeight:700, color:C.gray600 }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {(user.role==="student"?records:myRecords).sort((a,b)=>b.date.localeCompare(a.date)).map(r=>(
                <tr key={r.id} style={{ borderBottom:`1px solid ${C.gray100}` }}>
                  {user.role!=="student" && <td style={{ padding:"12px 14px", fontWeight:600, color:C.gray800 }}>{r.studentName}</td>}
                  <td style={{ padding:"12px 14px", color:C.gray600 }}>{r.date}</td>
                  <td style={{ padding:"12px 14px" }}><Badge label={r.status} color={statusColor(r.status)} /></td>
                </tr>
              ))}
              {!records.length && <tr><td colSpan={3} style={{ padding:24, textAlign:"center", color:C.gray400 }}>No attendance records found.</td></tr>}
            </tbody>
          </table>
        </div>
      </Card>
    </div>
  );
}

      studentName: db.users.find(u=>u.id===db.students.find(s=>s.id===x.student_id)?.user_id)?.name,

  const students = db2.students.map(s=>({ ...s, name: db2.users.find(u=>u.id===s.user_id)?.name }));

                    onMouseEnter={e=>e.currentTarget.style.background=C.gray50}

                    <td style={{ padding:"12px 14px", color:bal>0?C.red:C.green, fontWeight:600 }}>K {bal.toLocaleString()}</td>

                );
              })}
              {!fees.length && <tr><td colSpan={7} style={{ padding:24, textAlign:"center", color:C.gray400 }}>No fee records found.</td></tr>}
            </tbody>
          </table>
        </div>
      </Card>

      {modal && (
        <Modal title="Add Fee Record" onClose={()=>setModal(false)}>
          <Select label="Student" value={form.student_id} onChange={e=>setForm(p=>({...p,student_id:e.target.value}))}>
            <option value="">-- Select Student --</option>
            {students.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
          </Select>
          <Select label="Term" value={form.term} onChange={e=>setForm(p=>({...p,term:e.target.value}))}>
            <option>Term 1</option><option>Term 2</option><option>Term 3</option>
          </Select>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
            <Input label="Amount Due (K)" type="number" value={form.amount_due} onChange={e=>setForm(p=>({...p,amount_due:e.target.value}))} />
            <Input label="Amount Paid (K)" type="number" value={form.amount_paid} onChange={e=>setForm(p=>({...p,amount_paid:e.target.value}))} />
          </div>
          <Input label="Due Date" type="date" value={form.due_date} onChange={e=>setForm(p=>({...p,due_date:e.target.value}))} />
          <div style={{ display:"flex", gap:10, justifyContent:"flex-end" }}>
            <Btn variant="outline" onClick={()=>setModal(false)}>Cancel</Btn>
            <Btn onClick={save}>Add Record</Btn>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ── Messages Page ──────────────────────────────────────────
function MessagesPage({ user, toast }) {
  const [msgs, setMsgs] = useState([]);
  const [view, setView] = useState("inbox"); // inbox | compose | thread
  const [selected, setSelected] = useState(null);
  const [loading, setLoading] = useState(true);
  const [form, setForm] = useState({ receiver_id:"", subject:"", body:"" });
  const [reply, setReply] = useState("");

  function load() {
    const db = getDB();
    const all = db.messages.map(m=>({
      ...m,
      senderName: db.users.find(u=>u.id===m.sender_id)?.name,
      receiverName: db.users.find(u=>u.id===m.receiver_id)?.name,
    }));
    setMsgs(all);
    setLoading(false);
  }
  useEffect(()=>{ setTimeout(load,400); },[]);

  const inbox = msgs.filter(m=>m.receiver_id===user.id);
  const sent = msgs.filter(m=>m.sender_id===user.id);
  const unread = inbox.filter(m=>!m.read).length;

  function openMsg(m) {
    const db = getDB();
    const msg = db.messages.find(x=>x.id===m.id);
    if (msg) { msg.read=true; saveDB(db); }
    setSelected(m); setView("thread"); load();
  }

  function send() {
    if (!form.receiver_id||!form.subject||!form.body) { toast("All fields required.","error"); return; }
    const db = getDB();
    db.messages.push({ id:nextId(db.messages), sender_id:user.id, receiver_id:Number(form.receiver_id), subject:form.subject, body:form.body, date_sent:new Date().toISOString(), read:false });
    saveDB(db); toast("Message sent."); setForm({ receiver_id:"", subject:"", body:"" }); setView("inbox"); load();
  }

  function sendReply() {
    if (!reply.trim()) { toast("Write a reply first.","error"); return; }
    const db = getDB();
    const other = selected.sender_id===user.id ? selected.receiver_id : selected.sender_id;
    db.messages.push({ id:nextId(db.messages), sender_id:user.id, receiver_id:other, subject:`Re: ${selected.subject}`, body:reply, date_sent:new Date().toISOString(), read:false });
    saveDB(db); toast("Reply sent."); setReply(""); load();
  }

  const db2 = getDB();
  const contacts = db2.users.filter(u=>u.id!==user.id);
  if (loading) return <Spinner />;

  return (
    <div>
      <PageHeader title="Messages" subtitle={`${unread} unread message${unread!==1?"s":""}`}
        action={
          <div style={{ display:"flex", gap:8 }}>
            {view!=="inbox" && <Btn variant="outline" onClick={()=>setView("inbox")}>← Back</Btn>}
            <Btn onClick={()=>setView("compose")}>✉️ Compose</Btn>
          </div>
        } />

      {view==="compose" && (
        <Card>
          <h3 style={{ margin:"0 0 16px", fontSize:15, fontWeight:700, color:C.gray800 }}>New Message</h3>
          <Select label="To" value={form.receiver_id} onChange={e=>setForm(p=>({...p,receiver_id:e.target.value}))}>
            <option value="">-- Select recipient --</option>
            {contacts.map(c=><option key={c.id} value={c.id}>{c.name} ({c.role})</option>)}
          </Select>
          <Input label="Subject" value={form.subject} onChange={e=>setForm(p=>({...p,subject:e.target.value}))} />
          <Textarea label="Message" value={form.body} onChange={e=>setForm(p=>({...p,body:e.target.value}))} />
          <div style={{ display:"flex", gap:10 }}>
            <Btn onClick={send}>Send Message</Btn>
            <Btn variant="outline" onClick={()=>setView("inbox")}>Cancel</Btn>
          </div>
        </Card>
      )}

      {view==="thread" && selected && (
        <Card>
          <h3 style={{ margin:"0 0 4px", fontSize:17, fontWeight:700, color:C.gray800 }}>{selected.subject}</h3>
          <div style={{ fontSize:13, color:C.gray400, marginBottom:20 }}>
            From: {selected.senderName} → To: {selected.receiverName} · {new Date(selected.date_sent).toLocaleString()}
          </div>
          <div style={{ background:C.gray50, borderRadius:10, padding:16, marginBottom:16, fontSize:14, color:C.gray700, lineHeight:1.7 }}>
            {selected.body}
          </div>
          <h4 style={{ margin:"0 0 10px", fontSize:14, color:C.gray600 }}>Reply</h4>
          <Textarea value={reply} onChange={e=>setReply(e.target.value)} placeholder="Write your reply…" />
          <Btn onClick={sendReply}>Send Reply</Btn>
        </Card>
      )}

      {view==="inbox" && (
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16 }}>
          <Card>
            <h3 style={{ margin:"0 0 14px", fontSize:15, fontWeight:700, color:C.gray800 }}>📥 Inbox ({unread} unread)</h3>
            {inbox.length===0 && <p style={{ color:C.gray400, fontSize:14 }}>No messages.</p>}
            {inbox.sort((a,b)=>b.date_sent.localeCompare(a.date_sent)).map(m=>(
              <div key={m.id} onClick={()=>openMsg(m)} style={{
                padding:"12px 0", borderBottom:`1px solid ${C.gray100}`, cursor:"pointer",
                opacity: m.read?0.65:1,
              }}
              onMouseEnter={e=>e.currentTarget.style.paddingLeft="8px"}
              onMouseLeave={e=>e.currentTarget.style.paddingLeft="0"}>
                <div style={{ display:"flex", justifyContent:"space-between" }}>
                  <div style={{ fontWeight: m.read?500:700, fontSize:14, color:C.gray800 }}>{m.subject}</div>
                  {!m.read && <span style={{ width:8, height:8, borderRadius:"50%", background:C.purple, flexShrink:0, marginTop:4 }} />}
                </div>
                <div style={{ fontSize:12, color:C.gray400, marginTop:2 }}>From: {m.senderName} · {new Date(m.date_sent).toLocaleDateString()}</div>
              </div>
            ))}
          </Card>
          <Card>
            <h3 style={{ margin:"0 0 14px", fontSize:15, fontWeight:700, color:C.gray800 }}>📤 Sent</h3>
            {sent.length===0 && <p style={{ color:C.gray400, fontSize:14 }}>No sent messages.</p>}
            {sent.sort((a,b)=>b.date_sent.localeCompare(a.date_sent)).map(m=>(
              <div key={m.id} onClick={()=>openMsg(m)} style={{
                padding:"12px 0", borderBottom:`1px solid ${C.gray100}`, cursor:"pointer",
              }}>
                <div style={{ fontWeight:600, fontSize:14, color:C.gray800 }}>{m.subject}</div>
                <div style={{ fontSize:12, color:C.gray400, marginTop:2 }}>To: {m.receiverName} · {new Date(m.date_sent).toLocaleDateString()}</div>
              </div>
            ))}
          </Card>
        </div>
      )}
    </div>
  );
}

// ── Settings Page ──────────────────────────────────────────
function SettingsPage({ user, onUserUpdate, toast }) {
  const [name, setName] = useState(user.name);
  const [email, setEmail] = useState(user.email);
  const [oldPass, setOldPass] = useState("");
  const [newPass, setNewPass] = useState("");
  const [confirmPass, setConfirmPass] = useState("");

  function saveProfile() {
    if (!name||!email) { toast("Name and email required.","error"); return; }
    const db = getDB();
    const u = db.users.find(x=>x.id===user.id);
    if (u) { u.name=name; u.email=email; }
    saveDB(db); toast("Profile updated."); onUserUpdate({ ...user, name, email });
  }

  function changePassword() {
    if (!oldPass||!newPass||!confirmPass) { toast("Fill all password fields.","error"); return; }
    const db = getDB();
    const u = db.users.find(x=>x.id===user.id);
    if (!u||u.password!==oldPass) { toast("Current password is incorrect.","error"); return; }
    if (newPass!==confirmPass) { toast("New passwords do not match.","error"); return; }
    if (newPass.length<6) { toast("Password must be at least 6 characters.","error"); return; }
    u.password=newPass; saveDB(db); toast("Password changed successfully.");
    setOldPass(""); setNewPass(""); setConfirmPass("");
  }

  return (
    <div>
      <PageHeader title="Settings" subtitle="Manage your account" />
      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(300px,1fr))", gap:16 }}>
        <Card>
          <h3 style={{ margin:"0 0 20px", fontSize:15, fontWeight:700, color:C.gray800 }}>👤 Profile Information</h3>
          <div style={{ display:"flex", alignItems:"center", gap:14, marginBottom:24 }}>
            <div style={{
              width:64, height:64, borderRadius:18, background:`linear-gradient(135deg, ${C.purple}, ${C.purpleMid})`,
              display:"flex", alignItems:"center", justifyContent:"center", fontSize:28, color:C.white, fontWeight:800,
            }}>{user.name[0]}</div>
            <div>
              <div style={{ fontWeight:700, fontSize:16, color:C.gray800 }}>{user.name}</div>
              <div style={{ fontSize:13, color:C.gray400, textTransform:"capitalize" }}>{user.role}</div>
            </div>
          </div>
          <Input label="Full Name" value={name} onChange={e=>setName(e.target.value)} />
          <Input label="Email Address" type="email" value={email} onChange={e=>setEmail(e.target.value)} />
          <Btn onClick={saveProfile}>Save Profile</Btn>
        </Card>

        <Card>
          <h3 style={{ margin:"0 0 20px", fontSize:15, fontWeight:700, color:C.gray800 }}>🔐 Change Password</h3>
          <Input label="Current Password" type="password" value={oldPass} onChange={e=>setOldPass(e.target.value)} />
          <Input label="New Password" type="password" value={newPass} onChange={e=>setNewPass(e.target.value)} />
          <Input label="Confirm New Password" type="password" value={confirmPass} onChange={e=>setConfirmPass(e.target.value)} />
          <Btn onClick={changePassword}>Update Password</Btn>
        </Card>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════
// ── Main App ───────────────────────────────────────────────
// ══════════════════════════════════════════════════════════
function App() {
  const [user, setUser] = useState(null);
  const [page, setPage] = useState("dashboard");
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const { toasts, show: toast } = useToast();

  useEffect(() => {
    initDB();
    const session = getSession();
    if (session) setUser(session);
  }, []);

  function handleLogin(u) { setUser(u); setPage("dashboard"); }
  function handleLogout() { logout(); setUser(null); setPage("dashboard"); }

  const db = getDB();
  const unreadMsgs = user ? db.messages.filter(m=>m.receiver_id===user.id&&!m.read).length : 0;

  const SIDEBAR_W = 220;

  if (!user) return (
    <>
      <style>{`
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes slideIn { from { transform:translateX(60px); opacity:0 } to { transform:translateX(0); opacity:1 } }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      `}</style>
      <LoginPage onLogin={handleLogin} />
      <ToastContainer toasts={toasts} />
    </>
  );

  const renderPage = () => {
    const props = { user, toast };
    switch (page) {
      case "dashboard":   return <DashboardPage {...props} />;
      case "students":    return <StudentsPage {...props} />;
      case "teachers":    return <TeachersPage {...props} />;
      case "subjects":    return <SubjectsPage {...props} />;
      case "timetable":   return <TimetablePage {...props} />;
      case "assignments": return <AssignmentsPage {...props} />;
      case "results":     return <ResultsPage {...props} />;
      case "attendance":  return <AttendancePage {...props} />;
      case "notices":     return <NoticesPage {...props} />;
      case "fees":        return <FeesPage {...props} />;
      case "messages":    return <MessagesPage {...props} />;
      case "settings":    return <SettingsPage {...props} onUserUpdate={u=>setUser(u)} />;
      default:            return <DashboardPage {...props} />;
    }
  };

  return (
    <>
      <style>{`
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes slideIn { from { transform:translateX(60px); opacity:0 } to { transform:translateX(0); opacity:1 } }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: ${C.gray100}; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: ${C.gray200}; border-radius: 3px; }
        select { outline: none; }
        input:focus, select:focus, textarea:focus { outline: 2px solid ${C.purple}; outline-offset: 0; }
      `}</style>

      <Sidebar page={page} onNav={setPage} user={user} mobileOpen={sidebarOpen} onClose={()=>setSidebarOpen(false)} />

      <div style={{ marginLeft: sidebarOpen ? 0 : 0, transition:"margin 0.28s" }}>
        {/* Actual layout uses fixed sidebar */}
        <div style={{ paddingLeft: window.innerWidth>768 ? SIDEBAR_W : 0, transition:"padding 0.28s" }}>
          <Topbar user={user} onLogout={handleLogout} onMenuToggle={()=>setSidebarOpen(o=>!o)} unread={unreadMsgs} onNav={setPage} />
          <main style={{ padding:"24px 20px", minHeight:"calc(100vh - 60px)", maxWidth:1200 }}>
            {renderPage()}
          </main>
        </div>
      </div>

      <ToastContainer toasts={toasts} />
    </>
  );
}

const container = document.getElementById('root');
const root = ReactDOM.createRoot(container);
root.render(
  React.createElement(ErrorBoundary, null,
    React.createElement(App)
  )
);
</script>
</body>
