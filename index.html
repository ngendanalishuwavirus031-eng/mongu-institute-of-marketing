<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mongu Institute of Marketing — Portal</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap');
  html, body { margin: 0; padding: 0; background: #F6F3EA; font-family: 'Inter', sans-serif; }
  .font-serif { font-family: 'Fraunces', serif; }
  #build-error { display:none; font-family: monospace; white-space: pre-wrap; padding: 20px; color: #b91c1c; background: #fef2f2; }
</style>
</head>
<body>
<div id="root"></div>
<div id="build-error"></div>
<script>
  window.addEventListener('error', function (e) {
    var box = document.getElementById('build-error');
    box.style.display = 'block';
    box.textContent = 'Something went wrong loading the portal:\n\n' + (e.error ? (e.error.stack || e.error.message) : e.message);
  });
</script>

<!-- 1. Your Firebase project keys -->
<script src="firebase-config.js"></script>

<!-- 2. Firebase SDK bridge (real auth + real database) -->
<script type="module" src="firebase-bridge.js"></script>

<!-- 3. Jitsi Meet SDK (real, free video calls) -->
<script src="https://meet.jit.si/external_api.js"></script>

<!-- 4. The compiled portal app -->
<script src="bundle.js"></script>
</body>
</html>
