<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mongu Institute of Marketing — Portal</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap');
  html, body { margin: 0; padding: 0; background: #F6F3EA; font-family: 'Inter', sans-serif; }
  .font-serif { font-family: 'Fraunces', serif; }
  #build-error { display:none; position: sticky; top: 0; z-index: 9999; font-family: monospace; font-size: 13px; white-space: pre-wrap; padding: 16px; color: #7f1d1d; background: #fef2f2; border-bottom: 3px solid #dc2626; max-height: 50vh; overflow-y: auto; }
</style>
</head>
<body>
<div id="build-error"></div>
<div id="root"></div>
<script>
  var seenErrors = new Set();
  function showError(text) {
    var box = document.getElementById('build-error');
    box.style.display = 'block';
    if (seenErrors.has(text)) return;
    seenErrors.add(text);
    var line = document.createElement('div');
    line.style.marginBottom = '14px';
    line.style.paddingBottom = '14px';
    line.style.borderBottom = '1px solid #fecaca';
    line.textContent = text;
    box.appendChild(line);
  }
  window.addEventListener('error', function (e) {
    showError('Script error:\n' + (e.error ? (e.error.stack || e.error.message) : e.message));
  });
  window.addEventListener('unhandledrejection', function (e) {
    var r = e.reason;
    showError('Unhandled error:\n' + (r && (r.stack || r.message) ? (r.stack || r.message) : String(r)));
  });
  window.addEventListener('firebase-error', function (e) {
    var d = e.detail;
    showError('Firestore error on "' + d.path + '":\n' + d.err.code + ' — ' + d.err.message);
  });
</script>

<!-- 1. Your Firebase project keys -->
<script src="firebase-config.js"></script>

<!-- 2. Firebase SDK bridge (real auth + real database + storage) -->
<script type="module" src="firebase-bridge.js"></script>

<!-- 3. React (no build step — Babel transforms JSX right in the browser) -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- 4. The portal app (plain, readable source — edit this file directly) -->
<script type="text/babel" src="app.js"></script>
</body>
</html>
